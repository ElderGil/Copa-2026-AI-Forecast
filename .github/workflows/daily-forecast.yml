name: Daily forecast and Pages deploy

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-forecast.yml"
      - "configs/**"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "README.md"
      - "pyproject.toml"
  schedule:
    - cron: "17 4 * * *"
      timezone: "America/Sao_Paulo"
  workflow_dispatch:
    inputs:
      as_of_date:
        description: "Data de corte no formato YYYY-MM-DD. Vazio usa hoje em America/Sao_Paulo."
        required: false
        type: string
      run_id:
        description: "Identificador opcional do run. Vazio usa fifa-real-YYYY-MM-DD."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-forecast-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Resolve daily identifiers
        shell: bash
        env:
          INPUT_AS_OF_DATE: ${{ github.event.inputs.as_of_date || '' }}
          INPUT_RUN_ID: ${{ github.event.inputs.run_id || '' }}
        run: |
          set -euo pipefail
          as_of_date="${INPUT_AS_OF_DATE:-}"
          if [ -z "$as_of_date" ]; then
            as_of_date="$(TZ=America/Sao_Paulo date +%F)"
          fi
          run_id="${INPUT_RUN_ID:-}"
          if [ -z "$run_id" ]; then
            run_id="fifa-real-${as_of_date}"
          fi
          echo "AS_OF_DATE=${as_of_date}" >> "$GITHUB_ENV"
          echo "RUN_ID=${run_id}" >> "$GITHUB_ENV"
          echo "REPOSITORY_URL=https://github.com/${GITHUB_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Prepare dated config
        run: |
          python scripts/prepare_daily_config.py \
            --config configs/fifa.real.forecast.json \
            --output .generated/fifa.daily.forecast.json \
            --as-of-date "$AS_OF_DATE" \
            --run-id "$RUN_ID" \
            --github-url "$REPOSITORY_URL"

      - name: Run official FIFA ETL
        run: |
          copa-forecast etl-recent-matches --config .generated/fifa.daily.forecast.json

      - name: Generate forecast site
        run: |
          copa-forecast forecast \
            --config .generated/fifa.daily.forecast.json \
            --recent-matches data/processed/recent_matches/latest_matches.json

      - name: Refresh validation statistics
        run: |
          copa-forecast backtest \
            --config .generated/fifa.daily.forecast.json \
            --matches data/processed/recent_matches/latest_matches.json

      - name: Run reviewer quality gate
        run: |
          python scripts/verify_implementation.py

      - name: Commit daily published snapshot
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f README.md public
          if git diff --cached --quiet; then
            echo "No published artifacts changed."
          else
            git commit -m "chore: update forecast snapshot ${AS_OF_DATE} [skip ci]"
            git push
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
